# 真实服务器部署 — 直接拉取 CNB CI 构建好的镜像，无需在服务器上编译
# 用法：
#   docker login docker.cnb.cool -u cnb -p <你的访问令牌>
#   docker compose -f deploy/docker-compose.yml pull
#   docker compose -f deploy/docker-compose.yml up -d
services:
  minesweeper:
    image: docker.cnb.cool/wl_11111010110/minesweeper:latest
    container_name: minesweeper
    # 只绑定到本机回环，由前面的 Nginx 反代对外暴露（含 TLS）
    # 若不想用 Nginx、想直接对外，把下面改成 "3001:3001"
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped
