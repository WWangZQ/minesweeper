# Nginx 反向代理 — minesweeper
# 放到 /etc/nginx/sites-available/minesweeper 并软链到 sites-enabled/，或并入 conf.d/
#
# WebSocket 与 HTTP 共用同一端口(3001)，所以整站反代到后端即可，
# 关键是透传 Upgrade / Connection 头让 /ws 的 WebSocket 升级生效。

server {
    listen 80;
    server_name your-domain.com;          # 改成你的域名

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket 升级（/ws 依赖这两行）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 透传真实主机与客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 长连接：避免空闲被掐（服务端每 45s 心跳，这里给足余量）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# 启用 HTTPS：安装 certbot 后运行
#   sudo certbot --nginx -d your-domain.com
# certbot 会自动改写本文件加上 443/TLS，并把 80 重定向到 443。
# 页面走 https 后，前端会自动用 wss:// 连接（代码已按 location.protocol 适配）。
